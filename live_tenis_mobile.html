<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎾 Live Tenis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }
.header { background: #161b22; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #30363d; }
.header h1 { font-size: 16px; color: #58a6ff; }
.header .time { font-size: 11px; color: #8b949e; }
.stats { background: #161b22; padding: 6px 14px; display: flex; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid #30363d; }
.stat { font-size: 11px; font-weight: bold; }
.stat.master { color: #58a6ff; }
.stat.ss { color: #f0883e; }
.stat.match { color: #3fb950; }
.stat.diff { color: #f85149; }
.controls { padding: 8px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: #0d1117; }
button { padding: 7px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
.btn-refresh { background: #1f6feb; color: white; }
.btn-auto { background: #238636; color: white; }
.btn-stop { background: #da3633; color: white; }
.interval-wrap { display: flex; align-items: center; gap: 4px; color: #8b949e; font-size: 11px; }
.interval-wrap input { width: 40px; background: #161b22; color: white; border: 1px solid #30363d; border-radius: 4px; padding: 4px 6px; font-size: 12px; text-align: center; }
.log { padding: 4px 14px; color: #8b949e; font-size: 11px; min-height: 18px; }
.progress { height: 2px; background: #21262d; display: none; }
.progress-bar { height: 100%; background: #58a6ff; animation: prog 1.5s infinite; }
@keyframes prog { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
.progress.active { display: block; }
.matches { padding: 8px 14px 80px; }
.tournament-header { background: #21262d; color: #58a6ff; font-size: 11px; font-weight: bold; padding: 5px 10px; margin: 8px 0 2px; border-radius: 4px; border-left: 3px solid #58a6ff; }
.col-labels { display: grid; grid-template-columns: 1fr 28px 28px 28px 36px 8px 28px 28px 28px 36px 32px; gap: 2px; padding: 2px 8px; margin-bottom: 1px; }
.col-label { font-size: 9px; color: #8b949e; text-align: center; }
.col-label.left { text-align: left; }
.source-row { display: flex; padding: 0 8px; margin-bottom: 2px; gap: 6px; }
.src-badge { font-size: 9px; font-weight: bold; padding: 1px 6px; border-radius: 3px; }
.src-sofa { background: #1a3a5c; color: #58a6ff; }
.src-ss { background: #3a1a0d; color: #f0883e; margin-left: auto; }
.match-card { background: #161b22; border-radius: 6px; margin-bottom: 3px; overflow: hidden; border: 1px solid #21262d; }
.match-card.sets-diff { border-color: #f85149; background: #1c1217; }
.match-card.point-diff { border-color: #f0883e; background: #1c1710; }
.match-card.ok { border-color: #238636; }
.match-card.unmatched { opacity: 0.6; }
.match-row { display: grid; grid-template-columns: 1fr 28px 28px 28px 36px 8px 28px 28px 28px 36px 32px; gap: 2px; padding: 4px 8px; align-items: center; min-height: 26px; }
.match-row + .match-row { border-top: 1px solid #21262d; }
.player-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sets-diff .player-name { color: #f85149; }
.point-diff .player-name { color: #f0883e; }
.ok .player-name { color: #3fb950; }
.unmatched .player-name { color: #8b949e; }
.sc { text-align: center; font-size: 12px; font-weight: bold; color: #8b949e; }
.sc.val { color: #e6edf3; }
.sc.pt { color: #e6edf3; }
.sc.sep { color: #30363d; font-size: 10px; }
.sc.pct { color: #8b949e; font-size: 10px; }
.legend { display: flex; gap: 10px; padding: 4px 14px 8px; flex-wrap: wrap; }
.legend span { font-size: 10px; }
.l-sets { color: #f85149; }
.l-pts { color: #f0883e; }
.l-ok { color: #3fb950; }
.l-no { color: #8b949e; }
.empty { text-align: center; color: #8b949e; padding: 40px 20px; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <h1>🎾 Live Tenis</h1>
  <span class="time" id="lastRefresh">—</span>
</div>
<div class="stats">
  <span class="stat master" id="statMaster">Sofa: —</span>
  <span class="stat ss" id="statSS">SS: —</span>
  <span class="stat match" id="statMatch">Usl: —</span>
  <span class="stat diff" id="statDiff">Razl: —</span>
</div>
<div class="controls">
  <button class="btn-refresh" onclick="doRefresh()">🔄 Refresh</button>
  <button class="btn-auto" id="btnAuto" onclick="toggleAuto()">▶ Auto</button>
  <div class="interval-wrap">
    <span>Int:</span>
    <input type="number" id="interval" value="30" min="5" max="300">
    <span>s</span>
  </div>
</div>
<div class="progress" id="progress"><div class="progress-bar"></div></div>
<div class="log" id="log">Pritisni Refresh za početak.</div>
<div class="legend">
  <span class="l-sets">■ Razlika setovi</span>
  <span class="l-pts">■ Razlika poeni</span>
  <span class="l-ok">■ OK</span>
  <span class="l-no">■ Nije na SS</span>
</div>
<div class="matches" id="matches">
  <div class="empty">Nema podataka. Pritisni Refresh.</div>
</div>

<script>
var PROXY = 'https://tenis-proxy.isteficar.workers.dev/?url=';
var FUZZY_THRESHOLD = 65;
var autoInterval = null;
var isLoading = false;

function setLog(msg) { document.getElementById('log').textContent = msg; }
function setProgress(on) { document.getElementById('progress').classList.toggle('active', on); }

function toggleAuto() {
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
    document.getElementById('btnAuto').textContent = '▶ Auto';
    document.getElementById('btnAuto').className = 'btn-auto';
  } else {
    var ms = parseInt(document.getElementById('interval').value) * 1000;
    doRefresh();
    autoInterval = setInterval(doRefresh, ms);
    document.getElementById('btnAuto').textContent = '⏹ Stop';
    document.getElementById('btnAuto').className = 'btn-stop';
  }
}

// ═══ SOFASCORE ═══
function fetchSofaLive() {
  var sofaUrl = 'https://www.sofascore.com/api/v1/sport/tennis/events/live';
  return fetch(PROXY + encodeURIComponent(sofaUrl))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var events = data.events || [];
      var matches = [];
      events.forEach(function(ev) {
        try {
          var home = ev.homeTeam.name;
          var away = ev.awayTeam.name;
          var hs = ev.homeScore || {};
          var aws = ev.awayScore || {};
          var tournament = (ev.tournament && ev.tournament.name) ? ev.tournament.name : '';
          var ts = ev.startTimestamp || 0;
          var startTime = '';
          if (ts) {
            var dt = new Date(ts * 1000);
            startTime = dt.toLocaleTimeString('hr-HR', {hour: '2-digit', minute: '2-digit'});
          }
          var setsH = [], setsA = [];
          for (var i = 1; i <= 5; i++) {
            var key = 'period' + i;
            if (key in hs) {
              setsH.push(String(hs[key]));
              setsA.push(String(aws[key] !== undefined ? aws[key] : ''));
            }
          }
          matches.push({
            id: String(ev.id),
            tournament: tournament,
            startTime: startTime,
            startTs: ts,
            player1: home,
            player2: away,
            pairNorm: normPair(home, away),
            setsH: setsH,
            setsA: setsA,
            pointH: String(hs.point || ''),
            pointA: String(aws.point || '')
          });
        } catch(e) {}
      });
      matches.sort(function(a,b) {
        if (a.tournament < b.tournament) return -1;
        if (a.tournament > b.tournament) return 1;
        return a.startTs - b.startTs;
      });
      return matches;
    });
}

// ═══ SUPERSPORT ═══
function fetchSSLive() {
  var ssUrl = 'https://www.supersport.hr/uzivo';
  return fetch(PROXY + encodeURIComponent(ssUrl))
    .then(function(r) { return r.text(); })
    .then(function(html) {
      var div = document.createElement('div');
      div.innerHTML = html;
      var text = div.innerText || div.textContent || '';
      var lines = text.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l; });
      return parseSSLines(lines);
    });
}

function parseSSLines(lines) {
  var matches = [];
  var tenisStart = -1;
  for (var i = 0; i < lines.length; i++) {
    if (lines[i] === 'Tenis') { tenisStart = i; break; }
  }
  if (tenisStart < 0) return matches;

  var setRe = /^(\d+)\.set$/i;
  var oddsRe = /^\d+[,.]\d+/;
  var timeRe = /^\d{2}:\d{2}$/;
  var pts = ['0','15','30','40','A','AD'];
  var sports = ['Košarka','Nogomet','Hokej na ledu','Rukomet','MMA','Odbojka','Bejzbol','IZABERITE DOGAĐAJ'];
  var tourKw = ['ATP','WTA','ITF','Challenger','UTR','Houston','Miami','Madrid','Bogota',
                'Bucaramanga','Sao Paulo','Charleston','Las Vegas','Junin','Roland','Wimbledon','Open','Masters'];

  var currentTournament = '';
  var i = tenisStart + 1;

  while (i < lines.length) {
    var line = lines[i];
    if (sports.indexOf(line) >= 0) break;

    var isTourKw = false;
    for (var k = 0; k < tourKw.length; k++) {
      if (line.indexOf(tourKw[k]) >= 0) { isTourKw = true; break; }
    }
    if (!setRe.test(line) && !timeRe.test(line) && !oddsRe.test(line) &&
        !/^\d+$/.test(line) && pts.indexOf(line) < 0 && line.length > 3 && isTourKw) {
      currentTournament = line;
      i++; continue;
    }

    var mSet = setRe.exec(line);
    if (mSet && i + 2 < lines.length) {
      var N = parseInt(mSet[1]);
      var off = 1;
      if (timeRe.test(lines[i+off])) off++;
      if (i + off + 1 >= lines.length) { i++; continue; }

      var p1 = lines[i+off];
      var p2 = lines[i+off+1];
      if (/^\d/.test(p1) || /^\d/.test(p2) || p1.length < 3 || p2.length < 3) { i++; continue; }

      var scoreLines = [];
      var j = i + off + 2;
      while (j < lines.length && scoreLines.length < 25) {
        var sl = lines[j];
        if (oddsRe.test(sl) || setRe.test(sl)) break;
        if (sports.indexOf(sl) >= 0) break;
        scoreLines.push(sl);
        j++;
      }

      var allVals = scoreLines.filter(function(sl) {
        return pts.indexOf(sl) >= 0 || /^\d+$/.test(sl);
      });
      var perPlayer = 1 + 1 + N;
      var setsH = [], setsA = [], pointH = '', pointA = '';

      try {
        if (allVals.length >= perPlayer) {
          pointH = allVals[1];
          setsH = allVals.slice(2, 2 + N);
        }
        var base = perPlayer;
        if (allVals.length >= base + perPlayer) {
          pointA = allVals[base + 1];
          setsA = allVals.slice(base + 2, base + 2 + N);
        }
      } catch(e) {}

      matches.push({
        tournament: currentTournament,
        player1: p1, player2: p2,
        pairNorm: normPair(p1, p2),
        setsH: setsH, setsA: setsA,
        pointH: pointH, pointA: pointA
      });
      i = j; continue;
    }
    i++;
  }
  return matches;
}

// ═══ MATCHING ═══
function normName(s) { return s.trim().toLowerCase().replace(/\s+/g,' '); }
function normPair(p1, p2) { return normName(p1) + ' vs ' + normName(p2); }
function swapName(s) {
  var w = s.trim().split(' ');
  if (w.length === 2) return w[1]+' '+w[0];
  if (w.length === 3) return w[1]+' '+w[2]+' '+w[0];
  return s;
}
function swapPair(norm) {
  var p = norm.split(' vs ');
  return p.length === 2 ? swapName(p[0])+' vs '+swapName(p[1]) : norm;
}
function tokenSetRatio(a, b) {
  var wa = a.split(' ').filter(function(x){return x;});
  var wb = b.split(' ').filter(function(x){return x;});
  var waSet = {}, wbSet = {};
  wa.forEach(function(x){waSet[x]=1;});
  wb.forEach(function(x){wbSet[x]=1;});
  var inter = 0;
  wa.forEach(function(x){if(wbSet[x]) inter++;});
  var union = Object.keys(waSet).length + Object.keys(wbSet).length - inter;
  return union === 0 ? 100 : Math.round(100 * inter / union);
}
function bestMatch(query, choices) {
  var best = null, bestScore = 0, bestIdx = -1;
  var swapped = swapPair(query);
  for (var i = 0; i < choices.length; i++) {
    var s = Math.max(tokenSetRatio(query, choices[i]), tokenSetRatio(swapped, choices[i]));
    if (s > bestScore) { bestScore = s; best = choices[i]; bestIdx = i; }
  }
  return bestScore >= FUZZY_THRESHOLD ? [best, bestScore, bestIdx] : null;
}

// ═══ USPOREDBA ═══
function compare(master, ss) {
  var ssNorms = ss.map(function(m){return m.pairNorm;});
  var results = [];
  var matched = {};

  master.forEach(function(m) {
    var r = {master: m, ss: null, score: 0, matched: false, setsDiff: false, pointDiff: false};
    var match = bestMatch(m.pairNorm, ssNorms);
    if (match) {
      var score = match[1], idx = match[2];
      var s = ss[idx];
      matched[idx] = true;
      var mH = m.setsH, mA = m.setsA;
      var sH = s.setsH.slice(0, s.setsH.length - 1);
      var sA = s.setsA.slice(0, s.setsA.length - 1);
      var n = Math.min(mH.length, sH.length);
      var setsDiff = mH.slice(0,n).join() !== sH.slice(0,n).join() ||
                     mA.slice(0,n).join() !== sA.slice(0,n).join();
      var pointDiff = m.pointH !== s.pointH || m.pointA !== s.pointA;
      r.ss = s; r.score = score; r.matched = true;
      r.setsDiff = setsDiff; r.pointDiff = pointDiff;
    }
    results.push(r);
  });

  var mc = results.filter(function(r){return r.matched;}).length;
  var dc = results.filter(function(r){return r.setsDiff||r.pointDiff;}).length;
  return {results: results, mc: mc, dc: dc};
}

// ═══ RENDER ═══
function sc(arr, i) { return (arr && arr[i] !== undefined) ? arr[i] : ''; }

function render(results) {
  var container = document.getElementById('matches');
  if (!results.length) {
    container.innerHTML = '<div class="empty">Nema live mečeva.</div>';
    return;
  }

  var html = '';
  var prevT = null;

  results.forEach(function(r) {
    var m = r.master, s = r.ss;
    var t = m.tournament;

    if (t !== prevT) {
      html += '<div class="tournament-header">' + (t||'—') + '</div>';
      html += '<div class="source-row"><span class="src-badge src-sofa">SofaScore</span><span class="src-badge src-ss">SuperSport</span></div>';
      html += '<div class="col-labels"><span class="col-label left">Igrač</span><span class="col-label">S1</span><span class="col-label">S2</span><span class="col-label">S3</span><span class="col-label">P</span><span class="col-label">·</span><span class="col-label">S1</span><span class="col-label">S2</span><span class="col-label">S3</span><span class="col-label">P</span><span class="col-label">%</span></div>';
      prevT = t;
    }

    var cls = 'match-card';
    if (!r.matched) cls += ' unmatched';
    else if (r.setsDiff) cls += ' sets-diff';
    else if (r.pointDiff) cls += ' point-diff';
    else cls += ' ok';

    var pct = r.matched ? Math.round(r.score) + '%' : '—';

    html += '<div class="' + cls + '">';
    html += '<div class="match-row">';
    html += '<span class="player-name">' + m.player1 + '</span>';
    html += '<span class="sc val">' + sc(m.setsH,0) + '</span>';
    html += '<span class="sc val">' + sc(m.setsH,1) + '</span>';
    html += '<span class="sc val">' + sc(m.setsH,2) + '</span>';
    html += '<span class="sc pt">' + m.pointH + '</span>';
    html += '<span class="sc sep">│</span>';
    html += '<span class="sc val">' + (s ? sc(s.setsH,0) : '') + '</span>';
    html += '<span class="sc val">' + (s ? sc(s.setsH,1) : '') + '</span>';
    html += '<span class="sc val">' + (s ? sc(s.setsH,2) : '') + '</span>';
    html += '<span class="sc pt">' + (s ? s.pointH : '') + '</span>';
    html += '<span class="sc pct">' + pct + '</span>';
    html += '</div>';
    html += '<div class="match-row">';
    html += '<span class="player-name">' + m.player2 + '</span>';
    html += '<span class="sc val">' + sc(m.setsA,0) + '</span>';
    html += '<span class="sc val">' + sc(m.setsA,1) + '</span>';
    html += '<span class="sc val">' + sc(m.setsA,2) + '</span>';
    html += '<span class="sc pt">' + m.pointA + '</span>';
    html += '<span class="sc sep">│</span>';
    html += '<span class="sc val">' + (s ? sc(s.setsA,0) : '') + '</span>';
    html += '<span class="sc val">' + (s ? sc(s.setsA,1) : '') + '</span>';
    html += '<span class="sc val">' + (s ? sc(s.setsA,2) : '') + '</span>';
    html += '<span class="sc pt">' + (s ? s.pointA : '') + '</span>';
    html += '<span class="sc pct"></span>';
    html += '</div></div>';
  });

  container.innerHTML = html;
}

// ═══ MAIN ═══
function doRefresh() {
  if (isLoading) return;
  isLoading = true;
  setProgress(true);
  setLog('Dohvaćam SofaScore...');

  fetchSofaLive()
    .then(function(master) {
      setLog('Sofa: ' + master.length + ' live. Dohvaćam SuperSport...');
      return fetchSSLive().then(function(ss) {
        var res = compare(master, ss);
        document.getElementById('statMaster').textContent = 'Sofa: ' + master.length;
        document.getElementById('statSS').textContent = 'SS: ' + ss.length;
        document.getElementById('statMatch').textContent = 'Usl: ' + res.mc;
        document.getElementById('statDiff').textContent = 'Razl: ' + res.dc;
        document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString('hr-HR');
        render(res.results);
        setLog('✓ Sofa:' + master.length + ' SS:' + ss.length + ' Usl:' + res.mc + ' Razl:' + res.dc);
      });
    })
    .catch(function(err) {
      setLog('Greška: ' + err.message);
    })
    .finally(function() {
      setProgress(false);
      isLoading = false;
    });
}
</script>
</body>
</html>
