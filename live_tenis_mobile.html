<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎾 Live Tenis Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
  }

  /* HEADER */
  .header {
    background: #161b22;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #30363d;
  }
  .header h1 { font-size: 16px; color: #58a6ff; }
  .header .time { font-size: 11px; color: #8b949e; }

  /* STATS BAR */
  .stats {
    background: #161b22;
    padding: 6px 14px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid #30363d;
  }
  .stat { font-size: 11px; font-weight: bold; }
  .stat.sofa  { color: #58a6ff; }
  .stat.ss    { color: #f0883e; }
  .stat.match { color: #3fb950; }
  .stat.diff  { color: #f85149; }

  /* BUTTONS */
  .controls {
    padding: 8px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    background: #0d1117;
  }
  button {
    padding: 7px 14px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-refresh { background: #1f6feb; color: white; }
  .btn-auto    { background: #238636; color: white; }
  .btn-stop    { background: #da3633; color: white; }
  .btn-source  { background: #21262d; color: #8b949e; border: 1px solid #30363d; font-size: 11px; }
  .btn-source.active { background: #1a3a5c; color: #58a6ff; border-color: #58a6ff; }

  .interval-wrap { display: flex; align-items: center; gap: 4px; color: #8b949e; font-size: 11px; }
  .interval-wrap input {
    width: 40px; background: #161b22; color: white;
    border: 1px solid #30363d; border-radius: 4px;
    padding: 4px 6px; font-size: 12px; text-align: center;
  }

  /* LOG */
  .log { padding: 4px 14px; color: #8b949e; font-size: 11px; min-height: 18px; }

  /* PROGRESS */
  .progress {
    height: 2px;
    background: #21262d;
    display: none;
  }
  .progress-bar {
    height: 100%;
    background: #58a6ff;
    width: 0%;
    transition: width 0.3s;
    animation: progress-anim 1.5s infinite;
  }
  @keyframes progress-anim {
    0%   { width: 0%;   margin-left: 0; }
    50%  { width: 60%;  margin-left: 20%; }
    100% { width: 0%;   margin-left: 100%; }
  }
  .progress.active { display: block; }

  /* TABLICA */
  .matches { padding: 8px 14px 80px; }

  /* Turnir header */
  .tournament-header {
    background: #21262d;
    color: #58a6ff;
    font-size: 11px;
    font-weight: bold;
    padding: 5px 10px;
    margin: 8px 0 2px;
    border-radius: 4px;
    border-left: 3px solid #58a6ff;
  }

  /* Meč kartica */
  .match-card {
    background: #161b22;
    border-radius: 6px;
    margin-bottom: 3px;
    overflow: hidden;
    border: 1px solid #21262d;
  }
  .match-card.sets-diff  { border-color: #f85149; background: #1c1217; }
  .match-card.point-diff { border-color: #f0883e; background: #1c1710; }
  .match-card.ok         { border-color: #238636; }
  .match-card.unmatched  { opacity: 0.6; }

  /* Redak meča */
  .match-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto auto auto auto auto auto auto auto auto;
    gap: 0;
    padding: 4px 8px;
    align-items: center;
    min-height: 26px;
  }
  .match-row + .match-row {
    border-top: 1px solid #21262d;
  }

  .player-name {
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 6px;
  }
  .sets-diff .player-name { color: #f85149; }
  .point-diff .player-name { color: #f0883e; }
  .ok .player-name { color: #3fb950; }

  .score-cell {
    width: 26px;
    text-align: center;
    font-size: 12px;
    font-weight: bold;
    color: #8b949e;
  }
  .score-cell.current { color: #e6edf3; }
  .score-cell.point { color: #e6edf3; min-width: 28px; }

  .sep-cell {
    width: 10px;
    text-align: center;
    color: #30363d;
    font-size: 10px;
  }

  /* Zaglavlje stupaca */
  .col-headers {
    display: grid;
    grid-template-columns: 1fr auto auto auto auto auto auto auto auto auto auto auto;
    gap: 0;
    padding: 2px 8px;
    margin-top: 4px;
  }
  .col-header {
    font-size: 9px;
    color: #8b949e;
    text-align: center;
  }
  .col-header.left { text-align: left; }

  /* Source labels */
  .source-labels {
    display: flex;
    padding: 0 8px;
    margin-top: 2px;
    gap: 4px;
  }
  .source-label {
    font-size: 9px;
    font-weight: bold;
    padding: 1px 6px;
    border-radius: 3px;
  }
  .source-label.master { background: #1a3a5c; color: #58a6ff; }
  .source-label.ss     { background: #3a1a0d; color: #f0883e; }

  /* Pct badge */
  .pct-badge {
    font-size: 10px;
    color: #8b949e;
    padding-left: 4px;
    min-width: 32px;
  }

  /* Status badge */
  .status-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 10px;
    margin-left: 4px;
  }
  .badge-diff { background: #f85149; color: white; }
  .badge-ok   { background: #238636; color: white; }
  .badge-no   { background: #30363d; color: #8b949e; }

  /* Empty state */
  .empty {
    text-align: center;
    color: #8b949e;
    padding: 40px 20px;
    font-size: 14px;
  }

  /* Legenda */
  .legend {
    display: flex;
    gap: 10px;
    padding: 4px 14px 8px;
    flex-wrap: wrap;
  }
  .legend span { font-size: 10px; }
  .l-sets  { color: #f85149; }
  .l-pts   { color: #f0883e; }
  .l-ok    { color: #3fb950; }
  .l-no    { color: #8b949e; }
</style>
</head>
<body>

<div class="header">
  <h1>🎾 Live Tenis</h1>
  <span class="time" id="lastRefresh">—</span>
</div>

<div class="stats">
  <span class="stat sofa"  id="statMaster">Master: —</span>
  <span class="stat ss"    id="statSS">SS: —</span>
  <span class="stat match" id="statMatch">Usl: —</span>
  <span class="stat diff"  id="statDiff">Razl: —</span>
</div>

<div class="controls">
  <button class="btn-source active" id="btnFlash" onclick="setSource('flashscore')">Flashscore</button>
  <button class="btn-source"       id="btnSofa"  onclick="setSource('sofascore')">SofaScore</button>
  <button class="btn-refresh" onclick="doRefresh()">🔄 Refresh</button>
  <button class="btn-auto"   id="btnAuto" onclick="toggleAuto()">▶ Auto</button>
  <div class="interval-wrap">
    <span>Int:</span>
    <input type="number" id="interval" value="30" min="5" max="300">
    <span>s</span>
  </div>
</div>

<div class="progress" id="progress"><div class="progress-bar"></div></div>
<div class="log" id="log">Pritisni Refresh za početak.</div>

<div class="legend">
  <span class="l-sets">■ Razlika setovi</span>
  <span class="l-pts">■ Razlika poeni</span>
  <span class="l-ok">■ OK</span>
  <span class="l-no">■ Nije na SS</span>
</div>

<div class="matches" id="matches">
  <div class="empty">Nema podataka. Pritisni Refresh.</div>
</div>

<script>
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const PROXY = 'https://corsproxy.io/?url=';
const FUZZY_THRESHOLD = 70;
let currentSource = 'flashscore';
let autoInterval = null;
let isLoading = false;

// ═══════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════
function setLog(msg) {
  document.getElementById('log').textContent = msg;
}

function setProgress(active) {
  document.getElementById('progress').classList.toggle('active', active);
}

function setSource(src) {
  currentSource = src;
  document.getElementById('btnFlash').classList.toggle('active', src === 'flashscore');
  document.getElementById('btnSofa').classList.toggle('active', src === 'sofascore');
}

function toggleAuto() {
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
    document.getElementById('btnAuto').textContent = '▶ Auto';
    document.getElementById('btnAuto').className = 'btn-auto';
    setLog('Auto refresh zaustavljen.');
  } else {
    const interval = parseInt(document.getElementById('interval').value) * 1000;
    doRefresh();
    autoInterval = setInterval(doRefresh, interval);
    document.getElementById('btnAuto').textContent = '⏹ Stop';
    document.getElementById('btnAuto').className = 'btn-stop';
    setLog('Auto refresh aktivan.');
  }
}

// ═══════════════════════════════════════
//  FLASHSCORE FEED PARSER
// ═══════════════════════════════════════
function parseFSFeed(text) {
  const result = {};
  text.split('~').forEach(seg => {
    const d = {};
    seg.split('\u00ac').forEach(pair => {
      const idx = pair.indexOf('\u00f7');
      if (idx > 0) d[pair.slice(0, idx)] = pair.slice(idx + 1);
    });
    if (d.AA) result[d.AA] = d;
  });
  return result;
}

function parseFSTournaments(text) {
  const map = {};
  let current = '';
  text.split('~').forEach(seg => {
    const d = {};
    seg.split('\u00ac').forEach(pair => {
      const idx = pair.indexOf('\u00f7');
      if (idx > 0) d[pair.slice(0, idx)] = pair.slice(idx + 1);
    });
    if (d.ZA && !d.AA) current = d.ZA;
    else if (d.AA && d.CX) map[d.AA] = current;
  });
  return map;
}

async function fetchFlashscoreLive() {
  const headers = { 'X-GeoIP': '1', 'X-Fsign': 'SW9D1eZo' };
  const baseUrl = 'https://global.flashscore.ninja/2/x/feed/';

  const [playersRes, scoresRes] = await Promise.all([
    fetch(PROXY + encodeURIComponent(baseUrl + 'f_2_1_1_en_1'), { headers }),
    fetch(PROXY + encodeURIComponent(baseUrl + 'r_2_1'), { headers })
  ]);

  const playersText = await playersRes.text();
  const scoresText  = await scoresRes.text();

  const players    = parseFSFeed(playersText);
  const scores     = parseFSFeed(scoresText);
  const tournaments = parseFSTournaments(playersText);

  const matches = [];
  Object.entries(players).forEach(([id, p]) => {
    if (p.AB !== '1' || !p.CX) return;
    const sc = scores[id] || {};
    const sets_home = [], sets_away = [];
    [['BA','BB'],['BC','BD'],['BE','BF']].forEach(([a,b]) => {
      if (sc[a] !== undefined || sc[b] !== undefined) {
        sets_home.push(sc[a] || '');
        sets_away.push(sc[b] || '');
      }
    });
    const ts = parseInt(p.AD || 0);
    const dt = ts ? new Date(ts * 1000) : null;
    const startTime = dt ? dt.toLocaleTimeString('hr-HR', {hour:'2-digit', minute:'2-digit'}) : '';
    matches.push({
      id, tournament: tournaments[id] || '',
      start_time: startTime, start_ts: ts,
      player1: p.CX, player2: p.AF || '',
      pair_norm: normPair(p.CX, p.AF || ''),
      sets_home, sets_away,
      point_home: sc.WA || '', point_away: sc.WB || '',
    });
  });

  matches.sort((a,b) => a.tournament.localeCompare(b.tournament) || a.start_ts - b.start_ts);
  return matches;
}

// ═══════════════════════════════════════
//  SOFASCORE API
// ═══════════════════════════════════════
async function fetchSofaLive() {
  const url = 'https://www.sofascore.com/api/v1/sport/tennis/events/live';
  const res = await fetch(PROXY + encodeURIComponent(url));
  const data = await res.json();
  const events = data.events || [];

  const matches = events.map(ev => {
    const hs  = ev.homeScore || {};
    const aws = ev.awayScore || {};
    const ts  = ev.startTimestamp || 0;
    const dt  = ts ? new Date(ts * 1000) : null;
    const startTime = dt ? dt.toLocaleTimeString('hr-HR', {hour:'2-digit', minute:'2-digit'}) : '';
    const sets_home = [], sets_away = [];
    for (let i = 1; i <= 5; i++) {
      if (`period${i}` in hs) {
        sets_home.push(String(hs[`period${i}`]));
        sets_away.push(String(aws[`period${i}`] ?? ''));
      }
    }
    return {
      id: String(ev.id),
      tournament: ev.tournament?.name || '',
      start_time: startTime, start_ts: ts,
      player1: ev.homeTeam.name,
      player2: ev.awayTeam.name,
      pair_norm: normPair(ev.homeTeam.name, ev.awayTeam.name),
      sets_home, sets_away,
      point_home: String(hs.point || ''),
      point_away: String(aws.point || ''),
    };
  });

  matches.sort((a,b) => a.tournament.localeCompare(b.tournament) || a.start_ts - b.start_ts);
  return matches;
}

// ═══════════════════════════════════════
//  SUPERSPORT LIVE PARSER
// ═══════════════════════════════════════
async function fetchSSLive() {
  const url = 'https://www.supersport.hr/uzivo';
  const res = await fetch(PROXY + encodeURIComponent(url));
  const html = await res.text();

  // Parsiramo plain text iz HTML-a
  const div = document.createElement('div');
  div.innerHTML = html;
  const text = div.innerText || div.textContent || '';
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);

  return parseSSLines(lines);
}

function parseSSLines(lines) {
  const matches = [];
  let tenisStart = -1;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i] === 'Tenis') { tenisStart = i; break; }
  }
  if (tenisStart < 0) return matches;

  const setRe   = /^(\d+)\.set$/i;
  const oddsRe  = /^\d+[,.]\d+/;
  const timeRe  = /^\d{2}:\d{2}$/;
  const points  = new Set(['0','15','30','40','A','AD']);
  const sports  = new Set(['Košarka','Nogomet','Hokej na ledu','Rukomet',
                            'MMA','Odbojka','Bejzbol','IZABERITE DOGAĐAJ']);
  const tourKeys = ['ATP','WTA','ITF','Challenger','UTR','Houston','Miami',
                    'Madrid','Roma','Bogota','Bucaramanga','Sao Paulo',
                    'Charleston','Las Vegas','Junin','Roland','Wimbledon',
                    'Open','Masters','Acapulco','Dubai','Doha'];

  let currentTournament = '';
  let i = tenisStart + 1;

  while (i < lines.length) {
    const line = lines[i];
    if (sports.has(line) || line === 'IZABERITE DOGAĐAJ') break;

    // Turnir
    if (!setRe.test(line) && !timeRe.test(line) && !oddsRe.test(line) &&
        !/^\d+$/.test(line) && !points.has(line) && line.length > 3 &&
        tourKeys.some(k => line.includes(k))) {
      currentTournament = line;
      i++; continue;
    }

    const mSet = setRe.exec(line);
    if (mSet && i + 2 < lines.length) {
      const N = parseInt(mSet[1]);
      let off = 1;
      if (timeRe.test(lines[i+off])) off++;
      if (i + off + 1 >= lines.length) { i++; continue; }

      const p1 = lines[i+off];
      const p2 = lines[i+off+1];
      if (/^\d/.test(p1) || /^\d/.test(p2) || p1.length < 3 || p2.length < 3) {
        i++; continue;
      }

      const scoreLines = [];
      let j = i + off + 2;
      while (j < lines.length && scoreLines.length < 25) {
        const sl = lines[j];
        if (oddsRe.test(sl) || setRe.test(sl)) break;
        if (sports.has(sl) || sl === 'IZABERITE DOGAĐAJ') break;
        scoreLines.push(sl);
        j++;
      }

      const vals = scoreLines.map(sl =>
        points.has(sl) ? ['P', sl] : /^\d+$/.test(sl) ? ['N', sl] : null
      ).filter(Boolean);

      const perPlayer = 1 + 1 + N;
      let sets_home = [], sets_away = [];
      let point_home = '', point_away = '';

      if (vals.length >= perPlayer) {
        point_home = vals[1]?.[0] === 'P' ? vals[1][1] : '';
        sets_home  = vals.slice(2, 2+N).filter(v=>v[0]==='N').map(v=>v[1]);
      }
      if (vals.length >= perPlayer * 2) {
        const b = perPlayer;
        point_away = vals[b+1]?.[0] === 'P' ? vals[b+1][1] : '';
        sets_away  = vals.slice(b+2, b+2+N).filter(v=>v[0]==='N').map(v=>v[1]);
      }

      matches.push({
        tournament: currentTournament,
        player1: p1, player2: p2,
        pair_norm: normPair(p1, p2),
        sets_home, sets_away,
        point_home, point_away,
      });
      i = j; continue;
    }
    i++;
  }
  return matches;
}

// ═══════════════════════════════════════
//  FUZZY MATCHING
// ═══════════════════════════════════════
function normName(s) {
  return s.trim().toLowerCase().replace(/\s+/g,' ');
}
function normPair(p1, p2) {
  return normName(p1) + ' vs ' + normName(p2);
}
function swapName(s) {
  const w = s.trim().split(' ');
  if (w.length === 2) return w[1]+' '+w[0];
  if (w.length === 3) return w[1]+' '+w[2]+' '+w[0];
  return s;
}
function swapPair(norm) {
  const parts = norm.split(' vs ');
  if (parts.length === 2) return swapName(parts[0])+' vs '+swapName(parts[1]);
  return norm;
}

// Jednostavni token set ratio
function tokenSetRatio(a, b) {
  const wa = new Set(a.split(' ').filter(x=>x));
  const wb = new Set(b.split(' ').filter(x=>x));
  const inter = [...wa].filter(x=>wb.has(x)).length;
  if (wa.size === 0 && wb.size === 0) return 100;
  const union = new Set([...wa, ...wb]).size;
  return Math.round(100 * inter / union);
}

function bestMatchPair(query, choices) {
  let best = null, bestScore = 0, bestIdx = -1;
  const swapped = swapPair(query);
  choices.forEach((c, idx) => {
    const s1 = tokenSetRatio(query, c);
    const s2 = tokenSetRatio(swapped, c);
    const s = Math.max(s1, s2);
    if (s > bestScore) { bestScore = s; best = c; bestIdx = idx; }
  });
  if (bestScore >= FUZZY_THRESHOLD) return [best, bestScore, bestIdx];
  return null;
}

// ═══════════════════════════════════════
//  USPOREDBA
// ═══════════════════════════════════════
function compareMatches(master, ss) {
  const ssNorms = ss.map(m => m.pair_norm);
  const results = [];
  const matchedIdx = new Set();

  master.forEach(m => {
    const r = { master: m, ss: null, score: 0, matched: false, sets_diff: false, point_diff: false };
    const match = bestMatchPair(m.pair_norm, ssNorms);
    if (match) {
      const [,score,idx] = match;
      const s = ss[idx];
      matchedIdx.add(idx);
      const setsDiff = (m.sets_home.slice(0,-1).join() !== s.sets_home.slice(0,-1).join() ||
                        m.sets_away.slice(0,-1).join() !== s.sets_away.slice(0,-1).join());
      const pointDiff = (m.point_home !== s.point_home || m.point_away !== s.point_away);
      r.ss = s; r.score = score; r.matched = true;
      r.sets_diff = setsDiff; r.point_diff = pointDiff;
    }
    results.push(r);
  });

  const matchedCount = results.filter(r=>r.matched).length;
  const diffCount    = results.filter(r=>r.sets_diff||r.point_diff).length;
  return { results, matchedCount, diffCount };
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function renderMatches(results, masterLabel) {
  const container = document.getElementById('matches');

  if (!results.length) {
    container.innerHTML = '<div class="empty">Nema live mečeva.</div>';
    return;
  }

  let html = '';
  let prevTournament = null;

  results.forEach(r => {
    const m  = r.master;
    const s  = r.ss;
    const t  = m.tournament;

    if (t !== prevTournament) {
      html += `<div class="tournament-header">${t || '—'}</div>`;

      // Zaglavlje stupaca
      html += `
        <div style="display:flex;padding:0 8px;gap:4px;margin-bottom:1px;">
          <span class="source-label master">${masterLabel}</span>
          <span style="flex:1"></span>
          <span class="source-label ss">SuperSport</span>
        </div>
        <div class="col-headers">
          <span class="col-header left">Igrač</span>
          <span class="col-header">S1</span>
          <span class="col-header">S2</span>
          <span class="col-header">S3</span>
          <span class="col-header">P</span>
          <span class="col-header">·</span>
          <span class="col-header">S1</span>
          <span class="col-header">S2</span>
          <span class="col-header">S3</span>
          <span class="col-header">P</span>
          <span class="col-header">%</span>
        </div>`;
      prevTournament = t;
    }

    let cardClass = 'match-card';
    if (!r.matched)       cardClass += ' unmatched';
    else if (r.sets_diff) cardClass += ' sets-diff';
    else if (r.point_diff)cardClass += ' point-diff';
    else                  cardClass += ' ok';

    const pct = r.matched ? Math.round(r.score)+'%' : '—';

    const sh = m.sets_home;
    const sa = m.sets_away;
    const ssh = s ? s.sets_home : [];
    const ssa = s ? s.sets_away : [];

    const sc = (arr, i) => arr[i] !== undefined ? arr[i] : '';

    html += `<div class="${cardClass}">
      <div class="match-row">
        <span class="player-name">${m.player1}</span>
        <span class="score-cell">${sc(sh,0)}</span>
        <span class="score-cell">${sc(sh,1)}</span>
        <span class="score-cell">${sc(sh,2)}</span>
        <span class="score-cell point">${m.point_home}</span>
        <span class="sep-cell">│</span>
        <span class="score-cell">${sc(ssh,0)}</span>
        <span class="score-cell">${sc(ssh,1)}</span>
        <span class="score-cell">${sc(ssh,2)}</span>
        <span class="score-cell point">${s ? s.point_home : ''}</span>
        <span class="pct-badge">${pct}</span>
      </div>
      <div class="match-row">
        <span class="player-name">${m.player2}</span>
        <span class="score-cell">${sc(sa,0)}</span>
        <span class="score-cell">${sc(sa,1)}</span>
        <span class="score-cell">${sc(sa,2)}</span>
        <span class="score-cell point">${m.point_away}</span>
        <span class="sep-cell">│</span>
        <span class="score-cell">${sc(ssa,0)}</span>
        <span class="score-cell">${sc(ssa,1)}</span>
        <span class="score-cell">${sc(ssa,2)}</span>
        <span class="score-cell point">${s ? s.point_away : ''}</span>
        <span class="pct-badge"></span>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

// ═══════════════════════════════════════
//  MAIN REFRESH
// ═══════════════════════════════════════
async function doRefresh() {
  if (isLoading) return;
  isLoading = true;
  setProgress(true);

  const masterLabel = currentSource === 'flashscore' ? 'Flashscore' : 'SofaScore';
  setLog(`Dohvaćam ${masterLabel}...`);

  try {
    // Dohvati master
    let master;
    if (currentSource === 'flashscore') {
      master = await fetchFlashscoreLive();
    } else {
      master = await fetchSofaLive();
    }
    setLog(`${masterLabel}: ${master.length} live. Dohvaćam SuperSport...`);

    // Dohvati SS
    const ss = await fetchSSLive();

    // Usporedi
    const { results, matchedCount, diffCount } = compareMatches(master, ss);

    // Ažuriraj stats
    document.getElementById('statMaster').textContent = `${masterLabel}: ${master.length}`;
    document.getElementById('statSS').textContent     = `SS: ${ss.length}`;
    document.getElementById('statMatch').textContent  = `Usl: ${matchedCount}`;
    document.getElementById('statDiff').textContent   = `Razl: ${diffCount}`;

    const now = new Date().toLocaleTimeString('hr-HR');
    document.getElementById('lastRefresh').textContent = now;

    renderMatches(results, masterLabel);
    setLog(`✓ ${now} — ${masterLabel}:${master.length} SS:${ss.length} Usl:${matchedCount} Razl:${diffCount}`);

  } catch (err) {
    setLog(`Greška: ${err.message}`);
    console.error(err);
  }

  setProgress(false);
  isLoading = false;
}
</script>
