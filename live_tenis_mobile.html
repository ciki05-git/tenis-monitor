<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎾 Live Tenis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

.header { background: #161b22; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #30363d; }
.header h1 { font-size: 16px; color: #58a6ff; }
.header .time { font-size: 11px; color: #8b949e; }

.stats { background: #161b22; padding: 6px 14px; display: flex; gap: 12px; flex-wrap: wrap; border-bottom: 1px solid #30363d; }
.stat { font-size: 11px; font-weight: bold; }
.stat.master { color: #58a6ff; }
.stat.ss { color: #f0883e; }
.stat.match { color: #3fb950; }
.stat.diff { color: #f85149; }

.controls { padding: 8px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: #0d1117; }
button { padding: 7px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
.btn-refresh { background: #1f6feb; color: white; }
.btn-auto { background: #238636; color: white; }
.btn-stop { background: #da3633; color: white; }
.interval-wrap { display: flex; align-items: center; gap: 4px; color: #8b949e; font-size: 11px; }
.interval-wrap input { width: 40px; background: #161b22; color: white; border: 1px solid #30363d; border-radius: 4px; padding: 4px 6px; font-size: 12px; text-align: center; }

.log { padding: 4px 14px; color: #8b949e; font-size: 11px; min-height: 18px; }

.progress { height: 2px; background: #21262d; display: none; }
.progress-bar { height: 100%; background: #58a6ff; animation: prog 1.5s infinite; }
@keyframes prog { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
.progress.active { display: block; }

.matches { padding: 8px 14px 80px; }

.tournament-header { background: #21262d; color: #58a6ff; font-size: 11px; font-weight: bold; padding: 5px 10px; margin: 8px 0 2px; border-radius: 4px; border-left: 3px solid #58a6ff; }

.col-labels { display: grid; grid-template-columns: 1fr 28px 28px 28px 36px 8px 28px 28px 28px 36px 32px; gap: 2px; padding: 2px 8px; margin-bottom: 1px; }
.col-label { font-size: 9px; color: #8b949e; text-align: center; }
.col-label.left { text-align: left; }

.source-row { display: flex; padding: 0 8px; margin-bottom: 2px; gap: 6px; }
.src-badge { font-size: 9px; font-weight: bold; padding: 1px 6px; border-radius: 3px; }
.src-rez { background: #1a3a5c; color: #58a6ff; }
.src-ss { background: #3a1a0d; color: #f0883e; margin-left: auto; }

.match-card { background: #161b22; border-radius: 6px; margin-bottom: 3px; overflow: hidden; border: 1px solid #21262d; }
.match-card.sets-diff { border-color: #f85149; background: #1c1217; }
.match-card.point-diff { border-color: #f0883e; background: #1c1710; }
.match-card.ok { border-color: #238636; }
.match-card.unmatched { opacity: 0.6; }

.match-row { display: grid; grid-template-columns: 1fr 28px 28px 28px 36px 8px 28px 28px 28px 36px 32px; gap: 2px; padding: 4px 8px; align-items: center; min-height: 26px; }
.match-row + .match-row { border-top: 1px solid #21262d; }

.player-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sets-diff .player-name { color: #f85149; }
.point-diff .player-name { color: #f0883e; }
.ok .player-name { color: #3fb950; }
.unmatched .player-name { color: #8b949e; }

.sc { text-align: center; font-size: 12px; font-weight: bold; color: #8b949e; }
.sc.val { color: #e6edf3; }
.sc.pt { color: #e6edf3; }
.sc.sep { color: #30363d; font-size: 10px; }
.sc.pct { color: #8b949e; font-size: 10px; }

.legend { display: flex; gap: 10px; padding: 4px 14px 8px; flex-wrap: wrap; }
.legend span { font-size: 10px; }
.l-sets { color: #f85149; }
.l-pts { color: #f0883e; }
.l-ok { color: #3fb950; }
.l-no { color: #8b949e; }

.empty { text-align: center; color: #8b949e; padding: 40px 20px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>🎾 Live Tenis</h1>
  <span class="time" id="lastRefresh">—</span>
</div>

<div class="stats">
  <span class="stat master" id="statMaster">Rez: —</span>
  <span class="stat ss"     id="statSS">SS: —</span>
  <span class="stat match"  id="statMatch">Usl: —</span>
  <span class="stat diff"   id="statDiff">Razl: —</span>
</div>

<div class="controls">
  <button class="btn-refresh" onclick="doRefresh()">🔄 Refresh</button>
  <button class="btn-auto" id="btnAuto" onclick="toggleAuto()">▶ Auto</button>
  <div class="interval-wrap">
    <span>Int:</span>
    <input type="number" id="interval" value="30" min="5" max="300">
    <span>s</span>
  </div>
</div>

<div class="progress" id="progress"><div class="progress-bar"></div></div>
<div class="log" id="log">Pritisni Refresh za početak.</div>

<div class="legend">
  <span class="l-sets">■ Razlika setovi</span>
  <span class="l-pts">■ Razlika poeni</span>
  <span class="l-ok">■ OK</span>
  <span class="l-no">■ Nije na SS</span>
</div>

<div class="matches" id="matches">
  <div class="empty">Nema podataka. Pritisni Refresh.</div>
</div>

<script>
// ═══════════════════════════════
//  CONFIG
// ═══════════════════════════════
const PROXY = 'https://api.allorigins.win/raw?url=';
const FUZZY_THRESHOLD = 65;
let autoInterval = null;
let isLoading = false;

// ═══════════════════════════════
//  UI
// ═══════════════════════════════
function setLog(msg) { document.getElementById('log').textContent = msg; }
function setProgress(on) { document.getElementById('progress').classList.toggle('active', on); }

function toggleAuto() {
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
    document.getElementById('btnAuto').textContent = '▶ Auto';
    document.getElementById('btnAuto').className = 'btn-auto';
  } else {
    const ms = parseInt(document.getElementById('interval').value) * 1000;
    doRefresh();
    autoInterval = setInterval(doRefresh, ms);
    document.getElementById('btnAuto').textContent = '⏹ Stop';
    document.getElementById('btnAuto').className = 'btn-stop';
  }
}

// ═══════════════════════════════
//  REZULTATI.COM FEED PARSER
// ═══════════════════════════════
function parseFeed(text) {
  const result = {};
  text.split('~').forEach(seg => {
    const d = {};
    seg.split('\u00ac').forEach(pair => {
      const idx = pair.indexOf('\u00f7');
      if (idx > 0) d[pair.slice(0,idx)] = pair.slice(idx+1);
    });
    if (d.AA) result[d.AA] = d;
  });
  return result;
}

function parseTournaments(text) {
  const map = {};
  let current = '';
  text.split('~').forEach(seg => {
    const d = {};
    seg.split('\u00ac').forEach(pair => {
      const idx = pair.indexOf('\u00f7');
      if (idx > 0) d[pair.slice(0,idx)] = pair.slice(idx+1);
    });
    if (d.ZA && !d.AA) current = d.ZA;
    else if (d.AA && d.CX) map[d.AA] = current;
  });
  return map;
}

async function fetchRezultatiLive() {
  // Dohvati f_2_0_2_hr_1 feed kroz proxy
  const feedUrl = 'https://global.flashscore.ninja/2/x/feed/f_2_0_2_hr_1';
  const url = PROXY + encodeURIComponent(feedUrl);
  
  let text = '';
  try {
    const r = await fetch(url, {
      headers: { 'X-GeoIP': '1', 'X-Fsign': 'SW9D1eZo' }
    });
    text = await r.text();
  } catch(e) {
    // Pokušaj s alternativnim proxyjima
    try {
      const r2 = await fetch('https://corsproxy.io/?url=' + encodeURIComponent(feedUrl));
      text = await r2.text();
    } catch(e2) {
      throw new Error('Ne mogu dohvatiti Rezultati.com feed: ' + e2.message);
    }
  }

  if (!text || text.length < 10) throw new Error('Feed prazan');

  const players  = parseFeed(text);
  const tourMap  = parseTournaments(text);

  const matches = [];
  Object.entries(players).forEach(([id, d]) => {
    if (d.AB !== '2') return; // samo live
    const p1 = d.CX || '';
    const p2 = d.AF || '';
    if (!p1 || !p2) return;

    const ts = parseInt(d.AD || 0);
    let startTime = '';
    if (ts) {
      const dt = new Date(ts * 1000);
      startTime = dt.toLocaleTimeString('hr-HR', {hour:'2-digit', minute:'2-digit'});
    }

    const setsH = [], setsA = [];
    [['BA','BB'],['BC','BD'],['BE','BF']].forEach(([a,b]) => {
      if (d[a] !== undefined || d[b] !== undefined) {
        setsH.push(d[a] || '');
        setsA.push(d[b] || '');
      }
    });

    matches.push({
      id, tournament: tourMap[id] || '',
      startTime, startTs: ts,
      player1: p1, player2: p2,
      pairNorm: normPair(p1, p2),
      setsH, setsA,
      pointH: d.WA || '',
      pointA: d.WB || '',
    });
  });

  matches.sort((a,b) => a.tournament.localeCompare(b.tournament) || a.startTs - b.startTs);
  return matches;
}

// ═══════════════════════════════
//  SUPERSPORT PARSER
// ═══════════════════════════════
async function fetchSSLive() {
  const url = PROXY + encodeURIComponent('https://www.supersport.hr/uzivo');
  const r = await fetch(url);
  const html = await r.text();
  const div = document.createElement('div');
  div.innerHTML = html;
  const text = div.innerText || div.textContent || '';
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  return parseSSLines(lines);
}

function parseSSLines(lines) {
  const matches = [];
  let tenisStart = -1;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i] === 'Tenis') { tenisStart = i; break; }
  }
  if (tenisStart < 0) return matches;

  const setRe  = /^(\d+)\.set$/i;
  const oddsRe = /^\d+[,.]\d+/;
  const timeRe = /^\d{2}:\d{2}$/;
  const pts    = new Set(['0','15','30','40','A','AD']);
  const sports = new Set(['Košarka','Nogomet','Hokej na ledu','Rukomet','MMA','Odbojka','Bejzbol','IZABERITE DOGAĐAJ']);
  const tourKw = ['ATP','WTA','ITF','Challenger','UTR','Houston','Miami','Madrid','Bogota',
                  'Bucaramanga','Sao Paulo','Charleston','Las Vegas','Junin','Roland','Wimbledon','Open','Masters'];

  let currentTournament = '';
  let i = tenisStart + 1;

  while (i < lines.length) {
    const line = lines[i];
    if (sports.has(line) || line === 'IZABERITE DOGAĐAJ') break;

    // Turnir
    if (!setRe.test(line) && !timeRe.test(line) && !oddsRe.test(line) &&
        !/^\d+$/.test(line) && !pts.has(line) && line.length > 3 &&
        tourKw.some(k => line.includes(k))) {
      currentTournament = line;
      i++; continue;
    }

    const mSet = setRe.exec(line);
    if (mSet && i + 2 < lines.length) {
      const N = parseInt(mSet[1]);
      let off = 1;
      if (timeRe.test(lines[i+off])) off++;
      if (i + off + 1 >= lines.length) { i++; continue; }

      const p1 = lines[i+off];
      const p2 = lines[i+off+1];
      if (/^\d/.test(p1) || /^\d/.test(p2) || p1.length < 3 || p2.length < 3) { i++; continue; }

      const scoreLines = [];
      let j = i + off + 2;
      while (j < lines.length && scoreLines.length < 25) {
        const sl = lines[j];
        if (oddsRe.test(sl) || setRe.test(sl)) break;
        if (sports.has(sl) || sl === 'IZABERITE DOGAĐAJ') break;
        scoreLines.push(sl);
        j++;
      }

      // Sve numeričke po poziciji: ukupno(0) poen(1) set1(2)...setN gem
      const allVals = scoreLines.filter(sl => pts.has(sl) || /^\d+$/.test(sl));
      const perPlayer = 1 + 1 + N;
      let setsH = [], setsA = [], pointH = '', pointA = '';

      try {
        if (allVals.length >= perPlayer) {
          pointH = allVals[1];
          setsH  = allVals.slice(2, 2 + N);
        }
        const base = perPlayer;
        if (allVals.length >= base + perPlayer) {
          pointA = allVals[base + 1];
          setsA  = allVals.slice(base + 2, base + 2 + N);
        }
      } catch(e) {}

      matches.push({
        tournament: currentTournament,
        player1: p1, player2: p2,
        pairNorm: normPair(p1, p2),
        setsH, setsA, pointH, pointA,
      });
      i = j; continue;
    }
    i++;
  }
  return matches;
}

// ═══════════════════════════════
//  MATCHING
// ═══════════════════════════════
function normName(s) { return s.trim().toLowerCase().replace(/\s+/g,' '); }
function normPair(p1, p2) { return normName(p1) + ' vs ' + normName(p2); }
function swapName(s) {
  const w = s.trim().split(' ');
  if (w.length === 2) return w[1]+' '+w[0];
  if (w.length === 3) return w[1]+' '+w[2]+' '+w[0];
  return s;
}
function swapPair(norm) {
  const p = norm.split(' vs ');
  return p.length === 2 ? swapName(p[0])+' vs '+swapName(p[1]) : norm;
}
function tokenSetRatio(a, b) {
  const wa = new Set(a.split(' ').filter(x=>x));
  const wb = new Set(b.split(' ').filter(x=>x));
  const inter = [...wa].filter(x=>wb.has(x)).length;
  const union = new Set([...wa,...wb]).size;
  return union === 0 ? 100 : Math.round(100 * inter / union);
}
function bestMatch(query, choices) {
  let best = null, bestScore = 0, bestIdx = -1;
  const swapped = swapPair(query);
  choices.forEach((c,idx) => {
    const s = Math.max(tokenSetRatio(query,c), tokenSetRatio(swapped,c));
    if (s > bestScore) { bestScore = s; best = c; bestIdx = idx; }
  });
  return bestScore >= FUZZY_THRESHOLD ? [best, bestScore, bestIdx] : null;
}

// ═══════════════════════════════
//  USPOREDBA
// ═══════════════════════════════
function compare(master, ss) {
  const ssNorms = ss.map(m => m.pairNorm);
  const results = [];
  const matched = new Set();

  master.forEach(m => {
    const r = { master: m, ss: null, score: 0, matched: false, setsDiff: false, pointDiff: false };
    const match = bestMatch(m.pairNorm, ssNorms);
    if (match) {
      const [,score,idx] = match;
      const s = ss[idx];
      matched.add(idx);

      // Završeni setovi (SS zadnji = trenutni gem)
      const mH = m.setsH, mA = m.setsA;
      const sH = s.setsH.slice(0,-1), sA = s.setsA.slice(0,-1);
      const n = Math.min(mH.length, sH.length);
      const setsDiff = mH.slice(0,n).join() !== sH.slice(0,n).join() ||
                       mA.slice(0,n).join() !== sA.slice(0,n).join();
      const pointDiff = m.pointH !== s.pointH || m.pointA !== s.pointA;

      r.ss = s; r.score = score; r.matched = true;
      r.setsDiff = setsDiff; r.pointDiff = pointDiff;
    }
    results.push(r);
  });

  const mc = results.filter(r=>r.matched).length;
  const dc = results.filter(r=>r.setsDiff||r.pointDiff).length;
  return { results, mc, dc };
}

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function render(results) {
  const container = document.getElementById('matches');
  if (!results.length) { container.innerHTML = '<div class="empty">Nema live mečeva.</div>'; return; }

  let html = '';
  let prevT = null;

  results.forEach(r => {
    const m = r.master, s = r.ss;
    const t = m.tournament;

    if (t !== prevT) {
      html += `<div class="tournament-header">${t||'—'}</div>`;
      html += `
        <div class="source-row">
          <span class="src-badge src-rez">Rezultati.com</span>
          <span class="src-badge src-ss">SuperSport</span>
        </div>
        <div class="col-labels">
          <span class="col-label left">Igrač</span>
          <span class="col-label">S1</span><span class="col-label">S2</span><span class="col-label">S3</span>
          <span class="col-label">P</span><span class="col-label">·</span>
          <span class="col-label">S1</span><span class="col-label">S2</span><span class="col-label">S3</span>
          <span class="col-label">P</span><span class="col-label">%</span>
        </div>`;
      prevT = t;
    }

    let cls = 'match-card';
    if (!r.matched)       cls += ' unmatched';
    else if (r.setsDiff)  cls += ' sets-diff';
    else if (r.pointDiff) cls += ' point-diff';
    else                  cls += ' ok';

    const pct = r.matched ? Math.round(r.score)+'%' : '—';
    const sc = (arr,i) => arr[i] !== undefined ? arr[i] : '';

    html += `<div class="${cls}">
      <div class="match-row">
        <span class="player-name">${m.player1}</span>
        <span class="sc val">${sc(m.setsH,0)}</span>
        <span class="sc val">${sc(m.setsH,1)}</span>
        <span class="sc val">${sc(m.setsH,2)}</span>
        <span class="sc pt">${m.pointH}</span>
        <span class="sc sep">│</span>
        <span class="sc val">${s?sc(s.setsH,0):''}</span>
        <span class="sc val">${s?sc(s.setsH,1):''}</span>
        <span class="sc val">${s?sc(s.setsH,2):''}</span>
        <span class="sc pt">${s?s.pointH:''}</span>
        <span class="sc pct">${pct}</span>
      </div>
      <div class="match-row">
        <span class="player-name">${m.player2}</span>
        <span class="sc val">${sc(m.setsA,0)}</span>
        <span class="sc val">${sc(m.setsA,1)}</span>
        <span class="sc val">${sc(m.setsA,2)}</span>
        <span class="sc pt">${m.pointA}</span>
        <span class="sc sep">│</span>
        <span class="sc val">${s?sc(s.setsA,0):''}</span>
        <span class="sc val">${s?sc(s.setsA,1):''}</span>
        <span class="sc val">${s?sc(s.setsA,2):''}</span>
        <span class="sc pt">${s?s.pointA:''}</span>
        <span class="sc pct"></span>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

// ═══════════════════════════════
//  MAIN REFRESH
// ═══════════════════════════════
async function doRefresh() {
  if (isLoading) return;
  isLoading = true;
  setProgress(true);
  setLog('Dohvaćam Rezultati.com...');

  try {
    const master = await fetchRezultatiLive();
    setLog(`Rezultati.com: ${master.length} live. Dohvaćam SuperSport...`);

    const ss = await fetchSSLive();

    const { results, mc, dc } = compare(master, ss);

    document.getElementById('statMaster').textContent = `Rez: ${master.length}`;
    document.getElementById('statSS').textContent     = `SS: ${ss.length}`;
    document.getElementById('statMatch').textContent  = `Usl: ${mc}`;
    document.getElementById('statDiff').textContent   = `Razl: ${dc}`;
    document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString('hr-HR');

    render(results);
    setLog(`✓ Rez:${master.length} SS:${ss.length} Usl:${mc} Razl:${dc}`);

  } catch(err) {
    setLog(`Greška: ${err.message}`);
    console.error(err);
  }

  setProgress(false);
  isLoading = false;
}
</script>
</body>
</html>
